name: 24/7 Market Bot with Memory

on:
  schedule:
    - cron: '*/10 * * * *' # Har 10 minute baad auto-check
  workflow_dispatch:      # Manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Memory save karne ki ijazat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install feedparser requests python-dotenv

      - name: Run Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sent_urls.txt
          git commit -m "Memory Update [skip ci]" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
