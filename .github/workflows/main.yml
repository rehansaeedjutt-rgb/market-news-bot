name: 24/7 Market Bot with Memory

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is crucial for memory persistence

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser requests python-dotenv

      - name: Run Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Save Memory to Repo
        run: |
          git config --local user.email "rehansaeed@numl.edu.pk"
          git config --local user.name "Future-Admiral-Bot"
          git add sent_urls.txt
          git commit -m "Memory Update [skip ci]" || exit 0
          git push
